# =============================================================
# Hibiscus v5.0 — Additional Services
# =============================================================
# Usage:
#   docker compose -f docker-compose.yml -f hibiscus/docker-compose.hibiscus.yml up -d
# =============================================================

services:
  # ── Neo4j — Knowledge Graph ─────────────────────────────────
  hibiscus-neo4j:
    image: neo4j:5.25-community
    container_name: hibiscus-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/hibiscus_neo4j_2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    volumes:
      - hibiscus-neo4jdata:/data
      - hibiscus-neo4jlogs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "hibiscus_neo4j_2024", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - eazr-network

  # ── Qdrant — RAG + Vector Memory ────────────────────────────
  hibiscus-qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: hibiscus-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - hibiscus-qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - eazr-network

  # ── Hibiscus API Service ─────────────────────────────────────
  hibiscus-api:
    build:
      context: .
      dockerfile: hibiscus/Dockerfile
    container_name: hibiscus-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      HIBISCUS_ENV: production
      EAZR_API_BASE: http://eazr-app:8000
      REDIS_URL: redis://eazr-redis:6379/1
      MONGODB_URL: mongodb://eazr-mongo:27017/
      MONGODB_DB: hibiscus_db
      POSTGRESQL_URL: postgresql+asyncpg://eazr:eazr_secure_2024@eazr-postgres:5432/insurance_india
      NEO4J_URI: bolt://hibiscus-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hibiscus_neo4j_2024
      QDRANT_HOST: hibiscus-qdrant
      QDRANT_PORT: "6333"
      HIBISCUS_PORT: "8001"
    depends_on:
      - hibiscus-neo4j
      - hibiscus-qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/hibiscus/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - eazr-network

volumes:
  hibiscus-neo4jdata:
    name: hibiscus-neo4jdata
  hibiscus-neo4jlogs:
    name: hibiscus-neo4jlogs
  hibiscus-qdrantdata:
    name: hibiscus-qdrantdata
