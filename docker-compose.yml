#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild and start
#   docker compose logs -f hibiscus-api   # Follow API logs
#   docker compose down               # Stop all
#   docker compose down -v            # Stop + remove volumes

services:
  # ── PostgreSQL 15 — User Profiles, Portfolios, Outcomes ──────
  hibiscus-postgres:
    image: postgres:15-alpine
    container_name: hibiscus-postgres
    restart: unless-stopped
    labels:
      com.eazr.product: "Hibiscus"
      com.eazr.version: "0.9.0"
      com.eazr.vendor: "EAZR Digipayments Pvt Ltd"
    environment:
      POSTGRES_USER: hibiscus
      POSTGRES_PASSWORD: hibiscus_secure_2024
      POSTGRES_DB: insurance_india
    ports:
      - "5432:5432"
    volumes:
      - hibiscus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hibiscus -d insurance_india"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hibiscus-network

  # ── MongoDB 7 — Document Memory, Extractions ─────────────────
  hibiscus-mongo:
    image: mongo:7
    container_name: hibiscus-mongo
    restart: unless-stopped
    labels:
      com.eazr.product: "Hibiscus"
      com.eazr.version: "0.9.0"
      com.eazr.vendor: "EAZR Digipayments Pvt Ltd"
    environment:
      MONGO_INITDB_DATABASE: hibiscus_db
    ports:
      - "27017:27017"
    volumes:
      - hibiscus-mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hibiscus-network

  # ── Redis 7 — Session Memory, Response Cache ─────────────────
  hibiscus-redis:
    image: redis:7-alpine
    container_name: hibiscus-redis
    restart: unless-stopped
    labels:
      com.eazr.product: "Hibiscus"
      com.eazr.version: "0.9.0"
      com.eazr.vendor: "EAZR Digipayments Pvt Ltd"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - hibiscus-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - hibiscus-network

  # ── Neo4j 5 — Knowledge Graph ────────────────────────────────
  hibiscus-neo4j:
    image: neo4j:5.25-community
    container_name: hibiscus-neo4j
    restart: unless-stopped
    labels:
      com.eazr.product: "Hibiscus"
      com.eazr.version: "0.9.0"
      com.eazr.vendor: "EAZR Digipayments Pvt Ltd"
    environment:
      NEO4J_AUTH: neo4j/hibiscus_neo4j_2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    volumes:
      - hibiscus-neo4jdata:/data
      - hibiscus-neo4jlogs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "hibiscus_neo4j_2024", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hibiscus-network

  # ── Qdrant — RAG + Vector Memory ─────────────────────────────
  hibiscus-qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: hibiscus-qdrant
    restart: unless-stopped
    labels:
      com.eazr.product: "Hibiscus"
      com.eazr.version: "0.9.0"
      com.eazr.vendor: "EAZR Digipayments Pvt Ltd"
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - hibiscus-qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hibiscus-network

  # ── Hibiscus API — AI Intelligence Engine ────────────────────
  hibiscus-api:
    build:
      context: .
      dockerfile: hibiscus/Dockerfile
    container_name: hibiscus-api
    restart: unless-stopped
    labels:
      com.eazr.product: "Hibiscus"
      com.eazr.version: "0.9.0"
      com.eazr.vendor: "EAZR Digipayments Pvt Ltd"
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      HIBISCUS_ENV: production
      REDIS_URL: redis://hibiscus-redis:6379/1
      MONGODB_URL: mongodb://hibiscus-mongo:27017/
      MONGODB_DB: hibiscus_db
      POSTGRESQL_URL: postgresql+asyncpg://hibiscus:hibiscus_secure_2024@hibiscus-postgres:5432/insurance_india
      NEO4J_URI: bolt://hibiscus-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hibiscus_neo4j_2024
      QDRANT_HOST: hibiscus-qdrant
      QDRANT_PORT: "6333"
      HIBISCUS_PORT: "8001"
    depends_on:
      hibiscus-postgres:
        condition: service_healthy
      hibiscus-mongo:
        condition: service_healthy
      hibiscus-redis:
        condition: service_healthy
      hibiscus-neo4j:
        condition: service_healthy
      hibiscus-qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/hibiscus/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hibiscus-network

networks:
  hibiscus-network:
    name: hibiscus-network
    driver: bridge

volumes:
  hibiscus-pgdata:
    name: hibiscus-pgdata
  hibiscus-mongodata:
    name: hibiscus-mongodata
  hibiscus-redisdata:
    name: hibiscus-redisdata
  hibiscus-neo4jdata:
    name: hibiscus-neo4jdata
  hibiscus-neo4jlogs:
    name: hibiscus-neo4jlogs
  hibiscus-qdrantdata:
    name: hibiscus-qdrantdata
